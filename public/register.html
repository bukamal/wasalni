<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>تسجيل - وصلني</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="app-body">
  <div class="container">
    <header class="page-header">
      <button class="back-btn" onclick="history.back()">← رجوع</button>
      <h2 id="formTitle">تسجيل</h2>
    </header>

    <div class="card" id="registerCard">
      <div id="customerFields" class="hidden">
        <div class="input-group">
          <label>📞 رقم الهاتف</label>
          <input type="tel" id="phone" placeholder="05xxxxxxxx">
        </div>
      </div>

      <div id="driverFields" class="hidden">
        <div class="input-group">
          <label>🚗 موديل السيارة</label>
          <input type="text" id="carModel" placeholder="مثلاً: تويوتا كامري 2022">
        </div>
        <div class="input-group">
          <label>🔢 رقم اللوحة</label>
          <input type="text" id="carPlate" placeholder="أ ب ج 1234">
        </div>
        <div class="input-group">
          <label>📞 رقم الهاتف</label>
          <input type="tel" id="phoneDriver" placeholder="05xxxxxxxx">
        </div>
      </div>

      <button class="btn-primary" id="submitBtn">إرسال الطلب</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/register.js"></script>
</body>
</html>
