<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>تسجيل الدخول - وصلني</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
  <div class="container">
    <div class="login-header">
      <div class="logo-large">🚖</div>
      <h1>وصلني</h1>
      <p class="subtitle">اختر طريقة دخولك</p>
    </div>
    
    <div class="role-grid">
      <button class="role-card" id="roleCustomer">
        <div class="role-icon">👤</div>
        <h3>دخول كزبون</h3>
        <p>اطلب مشوارك الآن</p>
      </button>
      
      <button class="role-card" id="roleDriver">
        <div class="role-icon">🚗</div>
        <h3>دخول كسائق</h3>
        <p>استقبل الطلبات</p>
      </button>
      
      <button class="role-card hidden" id="roleAdmin">
        <div class="role-icon">🛡️</div>
        <h3>لوحة الإدارة</h3>
        <p>تحكم كامل</p>
      </button>
    </div>

    <div id="loginStatus" class="login-status"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/state.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
