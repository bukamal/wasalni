<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>بانتظار الموافقة - وصلني</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="pending-body">
  <div class="container" style="text-align:center;padding-top:30vh">
    <div style="font-size:4rem;margin-bottom:20px">⏳</div>
    <h2>طلبك قيد المراجعة</h2>
    <p style="margin:20px 0;color:var(--text-light)">سيراجع الأدمن طلب الانضمام وسيتم إعلامك عند الموافقة</p>
    <button class="btn-primary" onclick="checkStatus()">تحديث الحالة</button>
    <p id="statusMsg" style="margin-top:15px;color:var(--primary)"></p>
  </div>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const tg = window.Telegram.WebApp;
    if (tg) { tg.expand(); tg.ready(); }

    let checkInterval = setInterval(checkStatus, 5000);

    async function checkStatus() {
      const user = tg?.initDataUnsafe?.user;
      if (!user) return;
      try {
        const authRes = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            telegram_id: user.id,
            chat_id: user.id,
            full_name: user.first_name + ' ' + (user.last_name || '')
          })
        });
        const authData = await authRes.json();
        if (!authData.user) return;

        const res = await fetch('/api/join-request?action=status', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: authData.user.id })
        });
        const result = await res.json();
        const req = result.request;
        const statusMsg = document.getElementById('statusMsg');
        if (req) {
          if (req.status === 'approved') {
            clearInterval(checkInterval);
            statusMsg.textContent = '✅ تمت الموافقة! جاري التحويل...';
            setTimeout(() => {
              const role = localStorage.getItem('wasalni_role') || 'customer';
              if (role === 'driver') window.location.href = 'driver.html';
              else window.location.href = 'customer.html';
            }, 1500);
          } else if (req.status === 'rejected') {
            clearInterval(checkInterval);
            statusMsg.textContent = '❌ تم رفض الطلب. يرجى التواصل مع الإدارة.';
          } else {
            statusMsg.textContent = 'طلبك لا يزال قيد الانتظار...';
          }
        } else {
          statusMsg.textContent = 'لم يتم العثور على طلب.';
        }
      } catch(e) {
        console.error(e);
      }
    }

    window.addEventListener('beforeunload', () => clearInterval(checkInterval));
  </script>
</body>
</html>
