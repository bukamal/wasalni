<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>بانتظار الموافقة - وصلني</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="pending-body">
  <div class="container" style="text-align:center;padding-top:30vh">
    <div style="font-size:4rem;margin-bottom:20px">⏳</div>
    <h2>طلبك قيد المراجعة</h2>
    <p style="margin:20px 0;color:var(--text-light)">سيراجع الأدمن طلب الانضمام وسيتم إعلامك عند الموافقة</p>
    <button class="btn-primary" onclick="checkStatus()">🔄 تحديث الحالة</button>
    <p id="statusMsg" style="margin-top:15px;color:var(--primary)"></p>
  </div>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const tg = window.Telegram.WebApp;
    if (tg) { tg.expand(); tg.ready(); }

    // الحصول على user_id من المصادر الممكنة
    async function getUserId() {
      let uid = localStorage.getItem('wasalni_user_id');
      if (uid && uid.length > 10) return uid; // UUID غالباً

      // محاولة استخراجه من Telegram ثم supabase
      const user = tg?.initDataUnsafe?.user;
      if (!user) return null;
      try {
        const res = await fetch('/api/auth', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ telegram_id: user.id, chat_id: user.id, full_name: 'check' })
        });
        const data = await res.json();
        if (data.user && data.user.id) {
          localStorage.setItem('wasalni_user_id', data.user.id);
          return data.user.id;
        }
      } catch(e) {}
      return null;
    }

    let checkInterval = null;

    async function checkStatus() {
      const userId = await getUserId();
      if (!userId) {
        document.getElementById('statusMsg').textContent = '⚠️ تعذر التحقق من هويتك';
        return;
      }

      try {
        const res = await fetch('/api/join-request?action=status', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: userId })
        });
        const result = await res.json();
        const req = result.request;
        const statusMsg = document.getElementById('statusMsg');

        if (req) {
          if (req.status === 'approved') {
            if (checkInterval) clearInterval(checkInterval);
            statusMsg.textContent = '✅ تمت الموافقة! جاري التحويل...';
            setTimeout(() => {
              const role = localStorage.getItem('wasalni_role') || 'customer';
              if (role === 'driver') window.location.href = 'driver.html';
              else window.location.href = 'customer.html';
            }, 1500);
          } else if (req.status === 'rejected') {
            if (checkInterval) clearInterval(checkInterval);
            statusMsg.textContent = '❌ تم رفض الطلب. يرجى التواصل مع الإدارة.';
          } else {
            statusMsg.textContent = 'طلبك لا يزال قيد الانتظار...';
          }
        } else {
          statusMsg.textContent = 'لم يتم العثور على طلب. ربما تحتاج لإعادة تقديمه.';
        }
      } catch(e) {
        statusMsg.textContent = '❌ خطأ في الاتصال';
      }
    }

    // بدء التحقق الدوري
    (async () => {
      await checkStatus();
      checkInterval = setInterval(checkStatus, 5000);
    })();
  </script>
</body>
</html>
