<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>بانتظار الموافقة - وصلني</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="pending-body">
  <div class="container" style="text-align:center;padding-top:30vh">
    <div style="font-size:4rem;margin-bottom:20px">⏳</div>
    <h2>طلبك قيد المراجعة</h2>
    <p style="margin:20px 0;color:var(--text-light)">سيراجع الأدمن طلب الانضمام وسيتم إعلامك عند الموافقة</p>
    <button class="btn-primary" onclick="checkStatus()">🔄 تحديث الحالة</button>
    <p id="statusMsg" style="margin-top:15px;color:var(--primary)"></p>
  </div>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const tg = window.Telegram.WebApp;
    if (tg) { tg.expand(); tg.ready(); }

    let currentUserId = null;
    let checkInterval = null;

    async function getUserId() {
      const user = tg?.initDataUnsafe?.user;
      if (!user) return null;
      try {
        const res = await fetch('/api/auth', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            telegram_id: user.id,
            chat_id: user.id,
            full_name: user.first_name + ' ' + (user.last_name || '')
          })
        });
        const data = await res.json();
        if (data.user && data.user.id) {
          localStorage.setItem('wasalni_user_id', data.user.id);
          localStorage.setItem('wasalni_telegram_id', user.id);
          return data.user.id;
        }
      } catch(e) {}
      return null;
    }

    async function checkStatus() {
      if (!currentUserId) {
        currentUserId = await getUserId();
        if (!currentUserId) {
          document.getElementById('statusMsg').textContent = '⚠️ تعذر التحقق من هويتك';
          return;
        }
      }

      try {
        const res = await fetch('/api/join-request?action=status', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: currentUserId })
        });
        const result = await res.json();
        const req = result.request;
        const msg = document.getElementById('statusMsg');
        if (req) {
          if (req.status === 'approved') {
            clearInterval(checkInterval);
            msg.textContent = '✅ تمت الموافقة! جاري التحويل...';
            const role = localStorage.getItem('wasalni_role') || req.requested_role || 'customer';
            setTimeout(() => {
              if (role === 'driver') window.location.href = 'driver.html';
              else window.location.href = 'customer.html';
            }, 1500);
          } else if (req.status === 'rejected') {
            clearInterval(checkInterval);
            msg.textContent = '❌ تم رفض الطلب. يرجى التواصل مع الإدارة.';
          } else {
            msg.textContent = 'طلبك لا يزال قيد الانتظار...';
          }
        } else {
          msg.textContent = 'لم يتم العثور على طلب.';
        }
      } catch(e) {
        msg.textContent = '❌ خطأ في الاتصال';
      }
    }

    (async () => {
      currentUserId = await getUserId();
      if (currentUserId) {
        checkStatus();
        checkInterval = setInterval(checkStatus, 5000);
      } else {
        document.getElementById('statusMsg').textContent = '⚠️ تعذر التحقق من هويتك';
      }
    })();
  </script>
</body>
</html>
