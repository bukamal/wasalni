<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>تعرف على وصلني</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="onboarding-body">
  <div class="onboarding-container">
    <div class="slides-wrapper">
      <div class="slide active" id="slide-1">
        <div class="slide-image">🚕</div>
        <h2>اطلب مشوارك بسهولة</h2>
        <p>حدد موقعك ووجهتك ونوفر لك أقرب سائق في ثوانٍ</p>
      </div>
      <div class="slide" id="slide-2">
        <div class="slide-image">📍</div>
        <h2>تتبع رحلتك مباشرة</h2>
        <p>تابع وصول السائق ومسار الرحلة لحظة بلحظة على الخريطة</p>
      </div>
      <div class="slide" id="slide-3">
        <div class="slide-image">⭐</div>
        <h2>رحلة آمنة وموثوقة</h2>
        <p>سائقون موثوقون وتقييمات حقيقية لضمان أفضل تجربة</p>
        <button class="btn-start" id="startBtn">ابدأ الآن</button>
      </div>
    </div>

    <div class="onboarding-nav">
      <button id="prevBtn" class="nav-btn" disabled>السابق</button>
      <div class="dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
      <button id="nextBtn" class="nav-btn">التالي</button>
    </div>
  </div>

  <script>
    (function() {
      let current = 0;
      const slides = document.querySelectorAll('.slide');
      const dots = document.querySelectorAll('.dot');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const startBtn = document.getElementById('startBtn');

      function updateSlides() {
        slides.forEach((s, i) => s.classList.toggle('active', i === current));
        dots.forEach((d, i) => d.classList.toggle('active', i === current));
        prevBtn.disabled = current === 0;
        if (current === slides.length - 1) {
          nextBtn.style.display = 'none';
        } else {
          nextBtn.style.display = 'block';
        }
      }

      function changeSlide(dir) {
        current += dir;
        if (current < 0) current = 0;
        if (current >= slides.length) current = slides.length - 1;
        updateSlides();
      }

      function finishOnboarding() {
        localStorage.setItem('wasalni_onboarding', 'done');
        window.location.href = 'login.html';
      }

      // ربط الأزرار
      prevBtn.addEventListener('click', function() { changeSlide(-1); });
      nextBtn.addEventListener('click', function() { changeSlide(1); });
      if (startBtn) {
        startBtn.addEventListener('click', finishOnboarding);
      }

      // دعم السحب (swipe)
      let touchStartX = 0;
      const container = document.querySelector('.onboarding-container');
      container.addEventListener('touchstart', function(e) {
        touchStartX = e.touches[0].clientX;
      });
      container.addEventListener('touchend', function(e) {
        const diff = touchStartX - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 50) {
          if (diff > 0) changeSlide(1);   // سحب لليسار -> التالي
          else changeSlide(-1);           // سحب لليمين -> السابق
        }
      });

      updateSlides();
    })();
  </script>
</body>
</html>
