<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>السائق - وصلني</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="app-body">
  <div class="container">
    <header class="page-header">
      <button class="back-btn" id="backBtn">← رجوع</button>
      <div>
        <h2>🚗 لوحة السائق</h2>
        <span id="driverName" class="user-name">سائق</span>
      </div>
      <label class="status-switch">
        <input type="checkbox" id="onlineToggle">
        <span class="switch-track">
          <span class="switch-thumb"></span>
        </span>
        <span id="statusLabel" class="status-text">غير متاح</span>
      </label>
    </header>

    <div class="card" id="requestsCard">
      <div class="card-header">
        <h3>🔔 طلبات جديدة</h3>
        <span class="badge-count" id="requestsCount">0</span>
      </div>
      <div id="requestsList" class="list"></div>
    </div>

    <div class="card hidden" id="currentRide">
      <div class="card-header">
        <h3>📍 المشوار الحالي</h3>
        <span class="badge badge-accepted">قيد التنفيذ</span>
      </div>
      <div id="rideDetails" class="ride-info"></div>
      <div class="ride-actions-grid">
        <button class="btn-success" id="btnPickedUp">
          <span>✅</span> التقطت الراكب
        </button>
        <button class="btn-primary" id="btnCompleted">
          <span>🏁</span> وصلت
        </button>
        <button class="btn-danger" id="btnCancelled">
          <span>❌</span> إلغاء المشوار
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/driver.js"></script>
</body>
</html>
