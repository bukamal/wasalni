<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>الزبون - وصلني</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="customer-body">
  <div class="container">
    <header class="page-header">
      <button class="back-btn" id="backBtn">← رجوع</button>
      <div>
        <h2>👤 وصلني</h2>
        <span id="userName" class="user-name">زبون</span>
      </div>
      <button class="icon-btn" id="logoutBtn">🚪</button>
    </header>

    <div class="card ride-form" id="requestForm">
      <div class="card-header">
        <h3>📝 طلب مشوار جديد</h3>
      </div>
      <div class="input-group">
        <label>📍 موقع الالتقاط</label>
        <input type="text" id="pickup" placeholder="أدخل موقعك الحالي">
      </div>
      <div class="input-group">
        <label>🏁 الوجهة</label>
        <input type="text" id="dropoff" placeholder="أدخل وجهتك">
      </div>
      <div class="input-group">
        <label>💰 السعر المقترح (ر.س)</label>
        <input type="number" id="price" placeholder="0.00">
      </div>
      <button class="btn-primary" id="requestRideBtn">
        <span>🚕</span> طلب مشوار
      </button>
    </div>

    <div class="card hidden" id="rideStatus">
      <div class="status-header">
        <h3>جاري البحث عن سائق...</h3>
        <div class="pulse-ring"></div>
      </div>
      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>
      <p class="status-text">سيتم إخطارك عند قبول الطلب</p>
    </div>

    <div class="card">
      <div class="card-header">
        <h3>📋 سجل مشاويري</h3>
        <span class="badge-count" id="ridesCount">0</span>
      </div>
      <div id="ridesList" class="list"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/customer.js"></script>
</body>
</html>
